name: CI

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    name: Type-check, lint, audit & test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Audit production dependencies
        run: bun audit --prod

      - name: Type-check
        run: bun run check-types

      - name: Lint
        run: bun run lint

      # The VS Code integration/e2e tests launch a real (headless) Electron
      # instance, which needs an X server on Linux. `bun run test` also runs the
      # pretest hook (compile-tests + bundle + lint) before the suite.
      - name: Run tests (headless)
        run: xvfb-run -a bun run test
